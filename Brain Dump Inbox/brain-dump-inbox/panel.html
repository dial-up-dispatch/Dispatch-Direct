<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="dark">
<title>Brain Dump Inbox</title>
<style>
  @font-face {
    font-family: 'Space Mono';
    src: url('fonts/SpaceMono/SpaceMono-Regular.woff2') format('woff2');
    font-weight: 400;
    font-style: normal;
  }
  @font-face {
    font-family: 'Space Mono';
    src: url('fonts/SpaceMono/SpaceMono-Bold.woff2') format('woff2');
    font-weight: 700;
    font-style: normal;
  }
  @font-face {
    font-family: 'Space Mono';
    src: url('fonts/SpaceMono/SpaceMono-Italic.woff2') format('woff2');
    font-weight: 400;
    font-style: italic;
  }
  @font-face {
    font-family: 'Space Mono';
    src: url('fonts/SpaceMono/SpaceMono-BoldItalic.woff2') format('woff2');
    font-weight: 700;
    font-style: italic;
  }
</style>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="app-surface">

    <!-- HEADER -->
    <header class="app-header">
        <div class="connection-status">
            <span id="statusDot" class="status-dot">●</span> connected · local signal
        </div>
        <div class="app-title-row">
            <span class="app-logo">📺</span>
            <h1 class="app-title">brain dump inbox</h1>
        </div>
        <button type="button" id="settingsToggle" class="settings-toggle">
            // settings ▾
        </button>
        <div id="settingsPanel" class="settings-panel">
            <div class="settings-row">
                <span class="settings-label">signal:</span>
                <div class="theme-dots" id="themeDots">
                    <button type="button" class="theme-dot" data-theme="moss">
                        <span class="dot-inner" style="background-color: #5fffd7;"></span>
                    </button>
                    <button type="button" class="theme-dot" data-theme="amber">
                        <span class="dot-inner" style="background-color: #ffb300;"></span>
                    </button>
                    <button type="button" class="theme-dot" data-theme="periwinkle">
                        <span class="dot-inner" style="background-color: #8090d8;"></span>
                    </button>
                    <button type="button" class="theme-dot" data-theme="algae-copper">
                        <span class="dot-inner" style="background-color: #90c888;"></span>
                    </button>
                </div>
            </div>
            <div class="settings-row">
                <span class="settings-label">sound:</span>
                <div class="sound-options">
                    <button type="button" class="sound-option" id="soundOn">[ on ]</button>
                    <span class="sound-separator">|</span>
                    <button type="button" class="sound-option" id="soundOff">[ off ]</button>
                </div>
            </div>
        </div>
    </header>

    <hr class="surface-divider">

    <!-- DUMP ZONE -->
    <section class="dump-section" aria-label="dump mode">
        <p class="section-label">// dump mode</p>

        <div class="dump-input-wrapper">
            <div id="blockCursor" class="block-cursor"></div>
            <input
                type="text"
                id="dumpInput"
                class="dump-input"
                placeholder="what's in your head?"
                autocomplete="off"
            >
            <div id="dissolveOverlay" class="dissolve-overlay"></div>
        </div>

        <div class="dump-controls-row">
            <div class="custom-select" id="dumpTypeSelect">
                <button type="button" class="custom-select-trigger" id="dumpTypeTrigger">
                    <span id="dumpTypeLabel">idea</span>
                    <span class="custom-select-chevron">▾</span>
                </button>
                <div class="custom-select-menu" id="dumpTypeMenu">
                    <button type="button" class="custom-select-option selected" data-value="idea">idea</button>
                    <button type="button" class="custom-select-option" data-value="task">task</button>
                    <button type="button" class="custom-select-option" data-value="feeling">feeling</button>
                    <button type="button" class="custom-select-option" data-value="reminder">reminder</button>
                    <button type="button" class="custom-select-option" data-value="resource">resource</button>
                </div>
            </div>
            <button type="button" id="dumpButton" class="dump-button">dump it</button>
        </div>

        <div class="export-row">
            <button type="button" id="exportButton" class="export-button">export .md</button>
        </div>
    </section>

    <hr class="surface-divider">

    <!-- PILE ZONE -->
    <section class="pile-section" aria-label="the pile">
        <div class="pile-header">
            <p class="section-label" style="margin-bottom: 0;">// the pile</p>
            <span class="pile-count" id="pileCount"></span>
        </div>
        <div id="pileList" class="pile-list"></div>
    </section>

    <!-- TERMINAL FEED -->
    <section class="feed-section" aria-label="terminal activity feed">
        <div class="feed-header" id="feedHeader">
            <button type="button" class="feed-toggle-btn">// terminal activity feed</button>
            <span class="feed-chevron" id="feedChevron">▾</span>
        </div>
        <div id="feedLatest" class="feed-latest"></div>
        <div id="terminalLogs" class="terminal-logs"></div>
    </section>

</div>

<script src="js/app.js"></script>
</body>
</html>
